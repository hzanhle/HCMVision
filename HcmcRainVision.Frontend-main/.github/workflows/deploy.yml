name: Deploy to GitHub Pages


on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # Cho phép tải actions từ GitHub (tránh 401 khi dùng actions/deploy-pages, actions/checkout, ...)
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/HCMRAINVISION/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Frontend/HCMRAINVISION

      - name: Build
        run: npm run build
        working-directory: Frontend/HCMRAINVISION

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/HCMRAINVISION/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
